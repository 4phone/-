<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사거리인터넷 - 털보아저씨가 떡값 쏘는 곳!</title>
    <link rel="icon" href="사거리 로고.png" type="image/png">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght=500;700;900&family=Noto+Sans+KR:wght=500;700;900&display=swap">
    
    <style>
        /* 🎨 털보아저씨의 화끈한 국방색 & 골드 축제 테마 */
        :root { 
            --main-bg: #3E441E; 
            --point-color: #2D3214; 
            --gold-color: #FFD700;
            --gold-gradient: linear-gradient(135deg, #FFE000 0%, #799F0C 100%);
            --fire-orange: #FF5722;
            --kt-color: #d32f2f; --lg-color: #c2185b; --sk-color: #e65100; --sky-color: #0288d1; --hello-color: #7b1fa2; 
        }
        
        html { scroll-behavior: smooth; }
        body { 
            margin: 0; 
            font-family: 'Gmarket Sans', 'Noto Sans KR', sans-serif; 
            background-color: var(--main-bg); 
            color: #fff; 
            letter-spacing: -0.5px;
            overflow-x: hidden;
        }
        
        /* 상단 고정바 */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; height: 75px;
            background: rgba(17, 20, 7, 0.95); display: flex;
            align-items: center; justify-content: space-between; padding: 0 40px;
            z-index: 1000; border-bottom: 3px solid var(--gold-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .nav-logo {
            background: #fff; padding: 4px 12px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .nav-logo img { height: 42px; display: block; object-fit: contain; }
        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { 
            color: #fff; text-decoration: none; font-weight: 700; font-size: 16px; 
            transition: 0.2s; padding: 5px 10px; border-radius: 4px;
        }
        .nav-menu a:hover { color: var(--gold-color); background: rgba(255,255,255,0.1); }
        
        /* 🎯 사장님전용 우대 강조 테두리 고정 */
        .nav-menu a.boss-highlight-btn {
            color: var(--gold-color) !important;
            border: 2px solid var(--gold-color);
            border-radius: 8px;
            background-color: rgba(255, 215, 0, 0.12);
            font-weight: 900;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
            animation: borderPulse 2s infinite;
        }
        .nav-menu a.boss-highlight-btn:hover {
            background: var(--gold-color) !important;
            color: #111 !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }
        @keyframes borderPulse {
            0% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 18px rgba(255, 215, 0, 0.6); }
            100% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.3); }
        }
        
        /* 섹션 기본 틀 */
        .section { padding: 100px 20px 60px 20px; text-align: center; position: relative; }
        .section-title { 
            font-size: 36px; font-weight: 900; margin-bottom: 35px; 
            color: #fff; text-shadow: 3px 3px 0px rgba(0,0,0,0.3);
        }
        
        /* 첫화면 반반 분할형 스마트 영업 레이아웃 */
        #boss-section { 
            background: radial-gradient(circle at center, #555D29 0%, #2A2E14 100%);
            padding-top: 140px; padding-bottom: 80px;
            display: flex; justify-content: center; align-items: center;
            max-width: 1200px; margin: 0 auto; gap: 40px; text-align: left;
        }
        .main-left { flex: 1.1; text-align: center; } 
        .main-right { flex: 0.9; width: 100%; } 
        
        /* 입체 털보아저씨 액자 프레임 */
        .mascot-container {
            position: relative; display: inline-block;
            width: 240px; height: 240px; margin-bottom: 20px; perspective: 1000px;
        }
        .main-mascot {
            width: 100%; height: 100%; border-radius: 50%; background: #fff; padding: 4px; 
            box-sizing: border-box; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 6px solid var(--gold-color);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .mascot-container:hover .main-mascot {
            transform: scale(1.15) translateY(-8px) rotateX(5deg);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255,215,0,0.4);
        }
        
        /* 화려한 문구 */
        .headline { font-size: 36px; font-weight: 900; margin: 15px 0; line-height: 1.4; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        .headline span { 
            color: #111; background: var(--gold-color); padding: 2px 12px; border-radius: 10px;
            display: inline-block; transform: rotate(-1deg); box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }
        .sub-headline { font-size: 18px; font-weight: 700; color: #E2E8F0; margin-top: 15px; text-shadow: 1px 1px 4px rgba(0,0,0,0.4); }

        /* 폭죽 가루 애니메이션 */
        .confetti { position: absolute; z-index: 2; pointer-events: none; user-select: none; animation: fall linear forwards; }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        /* 접수창 카드 */
        .consult-main-card { 
            background: rgba(17, 20, 7, 0.75); border-radius: 20px; 
            padding: 25px; border: 2px solid rgba(255,215,0,0.25);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); box-sizing: border-box;
        }
        .consult-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .c-tab-btn { 
            flex: 1; padding: 12px 6px; border: 2px solid #fff; background: none; 
            color: #fff; font-weight: 900; font-size: 13px; cursor: pointer; border-radius: 8px; 
            transition: 0.2s; white-space: nowrap;
        }
        .c-tab-btn.active { background: var(--gold-color); color: #111; border-color: var(--gold-color); box-shadow: 0 4px 12px rgba(255,215,0,0.3); }
        
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .form-group input { 
            width: 100%; padding: 13px; border-radius: 8px; border: 2px solid #E2E8F0; 
            margin-bottom: 12px; box-sizing: border-box; font-size: 14px; font-family: inherit;
        }
        .submit-btn { 
            width: 100%; padding: 15px; background: var(--gold-color); border: none; 
            font-weight: 900; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255,215,0,0.2); color: #111;
        }
        .submit-btn:hover { background: #F6C200; }
        
        /* 원터치 직통 스마트 전화걸기 링크 버튼 */
        .phone-call-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; margin-top: 10px; padding: 12px; border-radius: 8px;
            background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.3);
            color: #fff; font-weight: 900; font-size: 14px; text-decoration: none;
            box-sizing: border-box; transition: 0.2s;
        }
        .phone-call-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--gold-color); color: var(--gold-color); }
        
        .kakao-btn-style {
            display: block; background: #FEE500; color: #111; text-decoration: none; 
            padding: 18px; border-radius: 8px; font-weight: 900; text-align: center;
            font-size: 16px; box-shadow: 0 6px 15px rgba(254,229,0,0.2);
        }

        /* 요금 계산기 */
        .calc-wrapper {
            max-width: 980px; margin: 0 auto; background: #fff;
            border-radius: 24px; padding: 40px; color: #2D3748;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .calc-group { margin-bottom: 35px; text-align: left; }
        .calc-group-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; color: #1A202C; border-left: 5px solid var(--main-bg); padding-left: 10px; }
        .logo-options { display: flex; flex-wrap: wrap; gap: 14px; }
        .logo-btn {
            background: #F7FAFC; border: 3px solid #E2E8F0; border-radius: 14px; padding: 10px; cursor: pointer; width: 150px; height: 55px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden;
        }
        .logo-btn img { max-width: 95%; max-height: 95%; object-fit: contain; mix-blend-mode: multiply; }
        .logo-btn.active { border-color: #799F0C; background: #F0FDF4; box-shadow: 0 8px 15px rgba(121,159,12,0.15); }
        .text-options { display: flex; flex-wrap: wrap; gap: 12px; }
        .text-btn {
            background: #F7FAFC; border: 3px solid #E2E8F0; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 15px; color: #4A5568;
            cursor: pointer; transition: 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .text-btn.active { background: var(--main-bg); color: #fff; border-color: var(--main-bg); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
