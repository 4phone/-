<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사거리인터넷</title>
    <link rel="icon" href="사거리 로고.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght=500;700;900&family=Noto+Sans+KR:wght=500;700;900&display=swap">
    <style>
        :root { 
            --main-bg: #3E441E; 
            --point-color: #2D3214; 
            --gold-color: #FFD700;
            --fire-orange: #FF5722;
        }
        
        /* 💥 클릭 시 해당 구역으로 부드럽게 스크롤 이동하는 기능만 추가 */
        html {
            scroll-behavior: smooth;
        }
        
        body { 
            margin: 0; padding: 0;
            font-family: 'Gmarket Sans', 'Noto Sans KR', sans-serif; 
            background-color: var(--main-bg); 
            color: #fff; 
            text-align: center;
        }

        /* 📋 [기존 틀 유지] 대표님이 만드신 검은색 상단 메뉴바 스타일 그대로 보존 */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: #111111; /* 원래 만드신 어두운 블랙톤 유지 */
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            padding: 8px 16px;
            transition: all 0.2s ease;
        }

        /* 🎯 [요청 반영] 사장님전용 글씨에만 깔끔하게 골드 테두리 테두리 추가 */
        .nav-menu a.highlight-boss {
            color: var(--gold-color);
            border: 2px solid var(--gold-color); /* 사장님 전용만 강조 테두리 */
            border-radius: 6px;
            background-color: rgba(255, 215, 0, 0.1); 
            font-weight: 900;
        }
        .nav-menu a.highlight-boss:hover {
            background-color: var(--gold-color);
            color: #111;
        }
        .nav-menu a:not(.highlight-boss):hover {
            color: var(--gold-color);
        }

        /* 섹션 공통 스타일 정의 */
        .section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .section-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-color);
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="nav-menu">
        <a href="boss.html" target="_blank" class="highlight-boss">🏬 사장님전용</a>
        <a href="#calculator-section">📊 요금계산기</a>
        <a href="#gift-section">🎁 사은품</a>
        <a href="#review-section">💬 실시간후기</a>
    </div>

    <div id="calculator-section" class="section">
        <div class="section-title">📊 맞춤 요금 계산기</div>
        
        <p style="color: #ccc; font-size: 15px;">대표님의 기존 요금계산기 컴포넌트가 그대로 완벽하게 픽스되어 돌아가는 자리입니다.</p>
        
    </div>


    <div id="gift-section" class="section">
        <div class="section-title">🎁 사거리인터넷 역대급 사은품 혜택</div>
        <p style="color: #aaa;">(계산기 아래쪽으로 배치 완료, 이제 대표님 지시대로 꾸밀 예정입니다)</p>
    </div>


    <div id="review-section" class="section">
        <div class="section-title">💬 고객 실시간 가입 후기</div>
        <p style="color: #aaa;">(가장 최하단 배치 완료)</p>
    </div>

</body>
</html>
