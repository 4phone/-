<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사거리인터넷 실시간 요금 안내</title>
    <style>
        :root { --kt-color: #d32f2f; --lg-color: #c2185b; --sk-color: #e65100; --sky-color: #0288d1; --hello-color: #7b1fa2; }
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; color: #333; }
        .header { background-color: #111; color: #fff; padding: 30px 20px; font-size: 26px; font-weight: bold; text-align: center; letter-spacing: -1px; }
        .notice { font-size: 14px; color: #ffeb3b; font-weight: normal; margin-top: 10px; }
        .nav-tabs { display: flex; justify-content: center; background: #fff; border-bottom: 1px solid #ddd; padding: 10px 0; sticky: top; }
        .tab-btn { border: none; background: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; color: #666; margin: 0 5px; border-radius: 20px; }
        .tab-btn.active { background: #222; color: #fff; }
        .grid-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; border-top: 5px solid #ccc; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card.kt { border-top-color: var(--kt-color); } .card.lg { border-top-color: var(--lg-color); } .card.sk { border-top-color: var(--sk-color); } .card.sky { border-top-color: var(--sky-color); } .card.hello { border-top-color: var(--hello-color); }
        .card-header { padding: 20px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
        .provider-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .kt .provider-badge { background: var(--kt-color); } .lg .provider-badge { background: var(--lg-color); } .sk .provider-badge { background: var(--sk-color); } .sky .provider-badge { background: var(--sky-color); } .hello .provider-badge { background: var(--hello-color); }
        .speed-title { font-size: 20px; font-weight: bold; margin: 0; }
        .card-body { padding: 20px; flex-grow: 1; text-align: center; }
        .price-box { margin: 15px 0; }
        .price-label { font-size: 12px; color: #999; text-decoration: line-through; }
        .price-main { font-size: 28px; font-weight: bold; color: #222; }
        .price-main span { font-size: 16px; font-weight: normal; }
        .benefit-box { background: #fff3e0; border-radius: 6px; padding: 12px; margin-top: 15px; font-size: 13px; font-weight: bold; color: #e65100; border: 1px dashed #ffb74d; }
        .gift-detail { font-size: 12px; color: #666; margin-top: 8px; }
        .btn-consult { display: block; width: 100%; padding: 12px 0; background: #222; color: #fff; text-align: center; text-decoration: none; font-weight: bold; font-size: 15px; border: none; cursor: pointer; }
        .btn-consult:hover { background: #444; }
        .loading { text-align: center; padding: 50px; font-size: 18px; color: #666; grid-column: 1/-1; }
    </style>
</head>
<body>

    <div class="header">
        🌐 사거리인터넷 실시간 요금제 안내
        <div class="notice">★ 본 정책은 구글 스프레드시트와 실시간 연동되어 상시 업데이트됩니다 ★</div>
    </div>
    
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="filterProvider('all')">전체보기</button>
        <button class="tab-btn" onclick="filterProvider('KT')">KT 올레</button>
        <button class="tab-btn" onclick="filterProvider('LG')">LG U+</button>
        <button class="tab-btn" onclick="filterProvider('SK')">SK브로드밴드</button>
        <button class="tab-btn" onclick="filterProvider('스카이')">스카이라이프</button>
        <button class="tab-btn" onclick="filterProvider('헬로')">LG헬로비전</button>
    </div>

    <div class="grid-container" id="rate-grid">
        <div class="loading">요금제 데이터를 안전하게 불러오는 중입니다...</div>
    </div>

    <script>
        // 대표님의 구글 시트 주소에서 데이터만 추출하는 경로입니다.
        const sheetId = '1Cen7UoI96Zof68N7bV-AbeO1fVq9C_qE_0fX_u_u-Cg';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                const rows = text.split('\n').map(row => row.split(','));
                
                // 1행 헤더 제외한 데이터 바인딩
                allData = rows.slice(1).filter(r => r[0] && r[0].trim() !== "");
                renderCards(allData);
            } catch (error) {
                document.getElementById('rate-grid').innerHTML = '<div class="loading">데이터를 불러오지 못했습니다. 구글 시트의 [웹에 게시] 상태를 확인해 주세요.</div>';
            }
        }

        function getCardClass(provider) {
            if(provider.includes('KT')) return 'kt';
            if(provider.includes('LG U')) return 'lg';
            if(provider.includes('SK')) return 'sk';
            if(provider.includes('스카이')) return 'sky';
            if(provider.includes('헬로')) return 'hello';
            return '';
        }

        function renderCards(data) {
            const grid = document.getElementById('rate-grid');
            grid.innerHTML = '';
            
            data.forEach(row => {
                const provider = row[0].replace(/"/g, '').trim();
                const speed = row[1].replace(/"/g, '').trim();
                const basePrice = parseInt(row[2]) ? parseInt(row[2]).toLocaleString() : row[2];
                const finalPrice = parseInt(row[4]) ? parseInt(row[4]).toLocaleString() : row[4];
                const guide = row[5].replace(/"/g, '').trim();
                const totalGift = row[8] ? row[8].replace(/"/g, '').trim() : '최대지원';

                const cardClass = getCardClass(provider);

                const cardHtml = `
                    <div class="card ${cardClass}" data-provider="${provider}">
                        <div class="card-header">
                            <span class="provider-badge">${provider}</span>
                            <h3 class="speed-title">${speed}</h3>
                        </div>
                        <div class="card-body">
                            <div class="price-box">
                                <div class="price-label">본사기준 월 ${basePrice}원</div>
                                <div class="price-main">${finalPrice}<span>원/월</span></div>
                            </div>
                            <div class="benefit-box">🎁 총 혜택: ${totalGift}</div>
                            <div class="gift-detail">가이드: ${guide}</div>
                        </div>
                        <button class="btn-consult" onclick="alert('전화 혹은 카카오톡으로 문의하시면 신속하게 상담해 드립니다!')">빠른 상담 신청하기</button>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        function filterProvider(providerKey) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(providerKey === 'all') {
                renderCards(allData);
            } else {
                const filtered = allData.filter(row => row[0].includes(providerKey));
                renderCards(filtered);
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
