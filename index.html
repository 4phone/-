<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사거리인터넷</title>
    <link rel="icon" href="사거리 로고.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght=500;700;900&family=Noto+Sans+KR:wght=500;700;900&display=swap">
    <style>
        :root { 
            --main-bg: #3E441E; 
            --point-color: #2D3214; 
            --gold-color: #FFD700;
            --fire-orange: #FF5722;
        }
        
        /* 메뉴 클릭 시 해당 구역으로 부드럽게 스크롤 이동 */
        html {
            scroll-behavior: smooth;
        }
        
        body { 
            margin: 0; padding: 0;
            font-family: 'Gmarket Sans', 'Noto Sans KR', sans-serif; 
            background-color: var(--main-bg); 
            color: #fff; 
            text-align: center;
        }

        /* 📋 [기존 틀 복구] 대표님이 만드신 상단 블랙 네비게이션 메뉴바 */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: #111111;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            padding: 8px 16px;
            transition: all 0.2s ease;
        }

        /* 🎯 [요청 반영] 가장 중요한 사장님전용 메뉴글씨 골드 테두리 강조 */
        .nav-menu a.highlight-boss {
            color: var(--gold-color);
            border: 2px solid var(--gold-color);
            border-radius: 6px;
            background-color: rgba(255, 215, 0, 0.1); 
            font-weight: 900;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }
        .nav-menu a.highlight-boss:hover {
            background-color: var(--gold-color);
            color: #111;
        }
        .nav-menu a:not(.highlight-boss):hover {
            color: var(--gold-color);
        }

        /* ⛺ [완벽 복구] 상단 메인 배너: 왼쪽 아저씨 / 오른쪽 접수창 양분 레이아웃 */
        .main-banner-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: table;
            width: 100%;
            box-sizing: border-box;
        }
        .banner-left-mascot {
            display: table-cell;
            width: 50%;
            vertical-align: middle;
            text-align: center;
        }
        .banner-left-mascot img {
            width: 100%;
            max-width: 380px;
            height: auto;
            display: inline-block;
        }
        
        .banner-right-form {
            display: table-cell;
            width: 50%;
            vertical-align: middle;
            text-align: left;
            padding-left: 30px;
            box-sizing: border-box;
        }
        
        /* 원래 사용하시던 복구된 접수창 디자인 틀 */
        .lead-form-box {
            background: #2D3214;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.2);
        }
        .form-title {
            font-size: 22px;
            font-weight: 900;
            color: var(--gold-color);
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #E2E8F0;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #4A5568;
            background: #fff;
            color: #1A202C;
            font-size: 15px;
            font-weight: 700;
            box-sizing: border-box;
        }
        .form-submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold-color);
            color: #111;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255,215,0,0.2);
            transition: 0.2s;
        }
        .form-submit-btn:hover {
            background: #F6C200;
        }

        /* 섹션 공통 스타일 */
        .section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .section-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-color);
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="nav-menu">
        <a href="boss.html" target="_blank" class="highlight-boss">🏬 사장님전용</a>
        <a href="#calculator-section">📊 요금계산기</a>
        <a href="#gift-section">🎁 사은품</a>
        <a href="#review-section">💬 실시간후기</a>
    </div>

    <div class="main-banner-container">
        <div class="banner-left-mascot">
            <img src="image_627d8d.jpg" alt="사거리인터넷 마스코트 털보아저씨">
        </div>
        
        <div class="banner-right-form">
            <div class="lead-form-box">
                <div class="form-title">⚡ 사거리인터넷<br>최대 사은품 실시간 접수창</div>
                <form action="#" method="POST" onsubmit="alert('상담 예약이 접수되었습니다. 곧 연락드리겠습니다!'); return false;">
                    <div class="form-group">
                        <label>성함</label>
                        <input type="text" class="form-input" placeholder="홍길동" required>
                    </div>
                    <div class="form-group">
                        <label>연락처</label>
                        <input type="tel" class="form-input" placeholder="010-1234-5678" required>
                    </div>
                    <button type="submit" class="form-submit-btn">🎁 최대로 지원받고 신청하기</button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="calculator-section" class="section">
        <div class="section-title">📊 맞춤 요금 계산기</div>
        <p style="color: #ccc; font-size: 15px;">대표님의 원래 요금계산기 기능이 픽스되어 정상 작동하는 위치입니다.</p>
    </div>

    <div id="gift-section" class="section">
        <div class="section-title">🎁 사거리인터넷 역대급 사은품 혜택</div>
        <p style="color: #aaa;">(요금계산기 바로 하단에 안전하게 배치 완료했습니다)</p>
    </div>

    <div id="review-section" class="section">
        <div class="section-title">💬 고객 실시간 가입 후기</div>
        <p style="color: #aaa;">(최하단에 안전하게 배치 완료했습니다)</p>
    </div>

</body>
</html>
