<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사거리인터넷 - 털보아저씨가 떡값 쏘는 곳!</title>
    <link rel="icon" href="사거리로고.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght=500;700;900&family=Noto+Sans+KR:wght=500;700;900&display=swap">
    <style>
        :root { --main-bg: #3E441E; --point-color: #2D3214; --gold-color: #FFD700; --fire-orange: #FF5722; --footer-bg: #EAEFE9; --footer-text: #555555; }
        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { margin: 0; padding: 0; font-family: 'Gmarket Sans', 'Noto Sans KR', sans-serif; background-color: var(--main-bg); color: #fff; letter-spacing: -0.5px; overflow-x: hidden; padding-bottom: 90px; }
        
        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 80px; background: #FFFFFF; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 1000; border-bottom: 3px solid var(--gold-color); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .nav-logo-group { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo-group img { height: 50px; display: block; object-fit: contain; background: #FFFFFF; }
        .nav-logo-text { font-size: 24px; font-weight: 900; color: #111111; letter-spacing: -1px; }
        .nav-menu { display: flex; gap: 24px; position: absolute; left: 50%; transform: translateX(-50%); align-items: center; }
        .nav-menu a { color: #2D3214; text-decoration: none; font-weight: 700; font-size: 15px; transition: 0.2s; padding: 6px 12px; border-radius: 6px; }
        .nav-menu a:hover { color: var(--fire-orange); background: rgba(0,0,0,0.05); }
        .nav-menu a.boss-highlight-btn { color: #E64A19 !important; border: 2px solid #FF5722; border-radius: 8px; background-color: rgba(255, 87, 34, 0.08); font-weight: 900; }
        .nav-phone-call-zone { display: flex; align-items: center; }
        .nav-phone-btn { display: flex; align-items: center; gap: 6px; background: var(--point-color); color: var(--gold-color); text-decoration: none; padding: 10px 18px; border-radius: 30px; font-weight: 900; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .nav-phone-btn:hover { transform: scale(1.04); background: #1B1E0C; }

        .section { padding: 100px 20px 60px 20px; text-align: center; position: relative; }
        .section-title { font-size: 36px; font-weight: 900; margin-bottom: 35px; color: #fff; text-shadow: 3px 3px 0px rgba(0,0,0,0.3); }
        
        #boss-section { background: var(--main-bg); padding-top: 140px; padding-bottom: 80px; display: flex !important; flex-direction: row !important; justify-content: center !important; align-items: center !important; max-width: 1200px; margin: 0 auto; gap: 40px; text-align: left; }
        .main-left { flex: 1.1; text-align: center; } .main-right { flex: 0.9; width: 100%; } 
        .mascot-container { position: relative; display: inline-block; width: 240px; height: 240px; margin-bottom: 20px; }
        .main-mascot { width: 100%; height: 100%; border-radius: 50%; background: #fff; padding: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 6px solid var(--gold-color); transition: transform 0.3s ease-out; }
        .mascot-container:hover .main-mascot { transform: scale(1.08); }
        .headline { font-size: 36px; font-weight: 900; margin: 15px 0; line-height: 1.4; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        .headline span { color: #111; background: var(--gold-color); padding: 2px 12px; border-radius: 10px; display: inline-block; transform: rotate(-1deg); }
        .sub-headline { font-size: 18px; font-weight: 700; color: #E2E8F0; margin-top: 15px; }

        .consult-main-card { background: rgba(17, 20, 7, 0.85); border-radius: 20px; padding: 25px; border: 2px solid rgba(255,215,0,0.25); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .consult-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .c-tab-btn { flex: 1; padding: 12px 4px; border: 2px solid #fff; background: none; color: #fff; font-weight: 900; font-size: 13px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .c-tab-btn.active { background: var(--gold-color); color: #111; border-color: var(--gold-color); }
        .form-panel { display: none; } .form-panel.active { display: block; }
        .form-group input { width: 100%; padding: 13px; border-radius: 8px; border: 2px solid #E2E8F0; margin-bottom: 12px; font-size: 14px; font-family: inherit; }
        
        .privacy-agree-zone { text-align: left; padding: 4px 2px 12px 2px; font-family: 'Noto Sans KR', sans-serif; }
        .privacy-label { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: #CBD5E0; cursor: pointer; line-height: 1.4; }
        .privacy-label input { margin-top: 2px; cursor: pointer; }
        .privacy-notice-txt { font-size: 11px; color: #A0AEC0; margin-top: 4px; padding-left: 20px; display: block; line-height: 1.3; }

        .submit-btn { width: 100%; padding: 15px; background: var(--gold-color); border: none; font-weight: 900; font-size: 16px; border-radius: 8px; cursor: pointer; color: #111; transition: 0.2s; }
        .submit-btn:hover { background: #F6C200; }
        
        .phone-call-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 10px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.3); color: #fff; font-weight: 900; font-size: 14px; text-decoration: none; transition: 0.2s; }
        .phone-call-btn:hover { border-color: var(--gold-color); color: var(--gold-color); background: rgba(255,215,0,0.05); }
        .main-sms-routing-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 8px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.3); color: #fff; font-weight: 900; font-size: 14px; text-decoration: none; transition: 0.2s; cursor: pointer; }
        .main-sms-routing-btn:hover { border-color: #48BB78; color: #48BB78; background: rgba(72,187,120,0.05); }
        
        .calc-wrapper { max-width: 980px; margin: 0 auto; background: #fff; border-radius: 24px; padding: 40px; color: #2D3748; box-shadow: 0 15px 40px rgba(0,0,0,0.4); position: relative; }
        .calc-group { margin-bottom: 35px; text-align: left; }
        .calc-group-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; color: #1A202C; border-left: 5px solid var(--main-bg); padding-left: 10px; }
        
        .logo-slider-outer { position: relative; width: 100%; }
        .logo-options { display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; align-items: center; width: 100%; }
        .logo-btn { background-color: #FFFFFF !important; border: 3px solid #E2E8F0 !important; border-radius: 14px !important; padding: 8px 15px !important; cursor: pointer; width: 170px; height: 65px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s ease, transform 0.2s ease; }
        .logo-btn img { max-width: 100%; max-height: 100%; object-fit: contain; background: transparent !important; }
        .logo-btn.active { border-color: #799F0C !important; background-color: #FFFFFF !important; box-shadow: 0 10px 20px rgba(121,159,12,0.18) !important; transform: scale(1.06); z-index: 10; }
        
        .text-options { display: flex; width: 100%; gap: 14px; justify-content: space-between; }
        .text-btn { flex: 1; text-align: center; background: #F7FAFC; border: 3px solid #E2E8F0; padding: 16px 20px; border-radius: 14px; font-weight: 900; font-size: 16px; color: #4A5568; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .text-btn.active { background: var(--main-bg); color: #fff; border-color: var(--main-bg); box-shadow: 0 8px 18px rgba(0,0,0,0.2); }
        .text-btn.disabled { opacity: 0.15 !important; cursor: not-allowed !important; background: #EDF2F7 !important; border-color: #CBD5E0 !important; color: #A0AEC0 !important; }

        .calc-result-box { background: #F8FAFC; border: 3px solid #E2E8F0; border-radius: 22px; padding: 35px; margin-top: 40px; display: flex; flex-direction: column; gap: 30px; }
        .res-row-prices { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 30px; width: 100%; }
        .res-col { flex: 1; min-width: 200px; text-align: center; }
        .res-label { font-size: 16px; font-weight: 700; color: #718096; margin-bottom: 10px; }
        .res-val { font-size: 34px; font-weight: 900; color: #1A202C; }
        .res-val span { font-size: 18px; font-weight: 700; }
        
        .normal-region-box { font-size: 15px; font-weight: 900; color: #3182ce; line-height: 1.5; background: #EDF2F7; padding: 18px; border-radius: 14px; border: 1px dashed #CBD5E0; }
        .accordion-wrapper { text-align: left; width: 100%; }
        .accordion-trigger { width: 100%; background: #fff; border: 2px solid #E2E8F0; padding: 12px 15px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 900; color: #2D3748; cursor: pointer; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .accordion-trigger img { height: 20px; object-fit: contain; }
        .accordion-arrow { font-size: 12px; transition: transform 0.25s ease-in-out; color: #A0AEC0; }
        .accordion-arrow.open { transform: rotate(180deg); color: #799F0C; }
        .accordion-panel { max-height: 0; overflow: hidden; transition: max-height 0.25s ease-in-out; background: #fff; border: 0 solid #E2E8F0; border-radius: 12px; margin-top: 6px; }
        .accordion-panel.open { max-height: 400px; border: 2px solid #E2E8F0; }
        .panel-scroll-box { max-height: 250px; overflow-y: auto; padding: 10px; }
        .region-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        .region-table th { background: #F7FAFC; color: #4A5568; font-weight: 900; padding: 10px 8px; border-bottom: 2px solid #E2E8F0; position: sticky; top: 0; }
        .region-table td { padding: 10px 8px; border-bottom: 1px solid #EDF2F7; color: #2D3748; font-weight: 500; }
        .region-tag { background: #EBF8FF; color: #2B6CB0; padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 11px; }

        .subsidy-box { width: 100%; max-width: 760px; margin: 0 auto; background: linear-gradient(135deg, #FFFDF5 0%, #FFF3E0 100%); border: 3px solid #FFB74D; border-radius: 20px; padding: 22px 15px; box-sizing: border-box; text-align: center; }
        .subsidy-val { color: var(--fire-orange); font-size: 40px; font-weight: 900; margin-top: 5px; }
        
        .calc-apply-trigger-btn { display: block; width: 100%; max-width: 760px; margin: 25px auto 0 auto; padding: 20px; background: linear-gradient(135deg, var(--fire-orange) 0%, #E64A19 100%); border: none; border-radius: 16px; color: #fff; font-family: inherit; font-size: 18px; font-weight: 900; cursor: pointer; text-align: center; box-shadow: 0 8px 25px rgba(255,87,34,0.35); }
        .calc-dynamic-apply-panel { display: none; width: 100%; max-width: 760px; margin: 20px auto 0 auto; background: #1A202C; border: 2px solid #4A5568; border-radius: 20px; padding: 25px; box-sizing: border-box; text-align: left; }
        
        .apply-product-summary-box { background: rgba(255,255,255,0.05); border-left: 5px solid #48BB78; padding: 15px; border-radius: 4px 10px 10px 4px; margin-bottom: 20px; }
        .apply-product-title { font-size: 14px; font-weight: 700; color: #A0AEC0; margin-bottom: 6px; }
        .apply-product-value { font-size: 18px; font-weight: 900; color: #48BB78; line-height: 1.4; }
        .apply-input-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .apply-input-row input { flex: 1; padding: 15px; border: 2px solid #4A5568; border-radius: 10px; background: #2D3748; color: #fff; font-family: inherit; font-size: 15px; font-weight: 700; }
        .apply-submit-final-btn { width: 100%; padding: 18px; background: #48BB78; border: none; font-family: inherit; font-size: 16px; font-weight: 900; color: #fff; border-radius: 12px; cursor: pointer; }

        #gift-section { background: rgba(0, 0, 0, 0.05); }
        .gift-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; max-width: 1040px; margin: 0 auto; }
        .gift-card { background: #fff; color: #2D3748; border-radius: 18px; padding: 20px; text-align: center; border: 3px solid #E2E8F0; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
        .gift-card:hover { transform: translateY(-5px); border-color: var(--gold-color); }
        .gift-card img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 15px; }
        .gift-card h4 { margin: 10px 0 0 0; font-size: 16px; font-weight: 900; color: #1A202C; }

        .universal-sticky-quick-bar { position: fixed; bottom: -200px; left: 0; right: 0; background: #1A202C; border-top: 4px solid var(--gold-color); z-index: 3000; box-shadow: 0 -5px 25px rgba(0,0,0,0.4); display: flex; flex-direction: column; transition: bottom 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .universal-sticky-quick-bar.show { bottom: 0; }
        .sticky-tier-1 { background: #2D3748; padding: 6px 40px; font-size: 14px; font-weight: 900; color: var(--gold-color); border-bottom: 1px solid #4A5568; text-align: left; }
        .sticky-tier-2 { padding: 12px 40px; display: flex; align-items: center; justify-content: space-between; gap: 20px; max-width: 1280px; margin: 0 auto; width: 100%; }
        .sticky-form-side { display: flex; align-items: center; gap: 12px; flex: 1; justify-content: flex-end; }
        .sticky-input-field { width: 200px; height: 45px; padding: 0 12px; border-radius: 8px; border: 1px solid #4A5568; background: #2D3748; color: #fff; font-size: 14px; font-weight: 700; }
        .sticky-action-btn { background: #ED8936; color: #fff; border: none; padding: 0 24px; height: 45px; border-radius: 8px; font-size: 15px; font-weight: 900; cursor: pointer; }

        .footer { background: #1B1E0C; color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.8; text-align: left; padding: 40px 40px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 80px; font-family: 'Noto Sans KR', sans-serif; }
        .footer-container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

        @media (max-width: 950px) {
            #boss-section { flex-direction: column !important; text-align: center !important; padding-top: 180px; }
            .logo-options { display: grid !important; grid-template-columns: repeat(6, 1fr) !important; gap: 8px !important; }
            .logo-btn { width: 100% !important; height: 54px !important; }
            body { padding-bottom: 190px; }
        }
    </style>
</head>
<body>
    
    <div class="navbar">
        <a href="#" class="nav-logo-group">
            <img src="사거리로고.png" alt="사거리인터넷 로고">
            <span class="nav-logo-text">사거리인터넷</span>
        </a>
        <div class="nav-menu">
            <a href="boss.html" target="_blank" class="boss-highlight-btn">사장님전용</a>
            <a href="#calculator-section">요금계산기</a>
            <a href="#gift-section">사은품</a>
        </div>
        <div class="nav-phone-call-zone">
            <a href="tel:18332440" class="nav-phone-btn">📞 직통전화: 1833-2440</a>
        </div>
    </div>

    <div class="universal-sticky-quick-bar" id="universalStickyBar">
        <div class="sticky-tier-1">💡 나에게 딱 맞는 최저가 요금을 실시간으로 계산해 보세요!</div>
        <div class="sticky-tier-2">
            <div class="sticky-form-side">
                <input type="text" id="sticky-user-name" class="sticky-input-field" placeholder="성함 입력">
                <input type="text" id="sticky-user-phone" class="sticky-input-field" placeholder="연락처 입력">
                <button id="sticky-main-btn" class="sticky-action-btn" onclick="alert('상담신청 기능입니다.')">🚀 상담신청</button>
            </div>
        </div>
    </div>

    <div class="section" id="boss-section">
        <div class="main-left">
            <div class="mascot-container"><img src="털보아저씨국방색.png" class="main-mascot" alt="털보"></div>
            <div class="headline">✨ 털보아저씨가<br><span>시원하게 떡값 쏘는 곳!</span> ✨</div>
            <div class="sub-headline">인터넷 + TV 가입하면 화끈한 지원금에 프리미엄 가전까지 아낌없이 다 드립니다!</div>
        </div>
        <div class="main-right">
            <div class="consult-main-card">
                <div class="consult-tabs">
                    <button class="c-tab-btn active">⚡ 간편 빠른상담</button>
                    <button class="c-tab-btn">📝 원스톱 다이렉트접수</button>
                </div>
                <div class="form-panel active">
                    <div class="form-group"><input type="text" placeholder="성함을 적어주세요"></div>
                    <div class="form-group"><input type="text" placeholder="연락처를 적어주세요"></div>
                    <button class="submit-btn">화끈하게 빠른 상담 신청</button>
                </div>
            </div>
        </div>
    </div>

    <div class="section" id="calculator-section">
        <div class="section-title">📊 실시간 맞춤 요금 계산기</div>
        <div class="calc-wrapper">
            <div class="calc-group">
                <div class="calc-group-title">1단계: 통신사 브랜드를 선택해 주세요</div>
                <div class="logo-options" id="logoOptionsScroll">
                    <div class="logo-btn" onclick="alert('통신사 선택')"><img src="엘지로고.png" alt="LG"></div>
                    <div class="logo-btn"><img src="에스케이로고.jpg" alt="SK"></div>
                    <div class="logo-btn"><img src="케이티로고.jpg" alt="KT"></div>
                </div>
            </div>
            
            <div class="calc-group">
                <div class="calc-group-title">2단계: 상품 구성을 골라주세요</div>
                <div class="text-options">
                    <div class="text-btn active">💻 인터넷 단독</div>
                    <div class="text-btn">📺 인터넷 + TV 결합</div>
                </div>
            </div>

            <div class="calc-result-box">
                <div class="res-row-prices">
                    <div class="res-col">
                        <div class="res-label">본사 표준 요금</div>
                        <div class="res-val">0원</div>
                    </div>
                </div>
                <div class="subsidy-box">
                    <div class="res-label" style="color:#DD6B20; font-weight:900;">사거리 특별 지원금</div>
                    <div class="res-val subsidy-val">0원</div>
                </div>
            </div>

            <button class="calc-apply-trigger-btn">🔥 즉시 가입신청하기</button>
        </div>
    </div>

    <div class="section" id="gift-section">
        <div class="section-title">🎁 사거리인터넷 독점 사은품 라인업</div>
        <div class="gift-grid">
            <div class="gift-card"><h4>삼성 스마트 TV</h4></div>
            <div class="gift-card"><h4>무선 청소기</h4></div>
        </div>
    </div>

    <script>
        window.addEventListener('scroll', function() {
            const bar = document.getElementById('universalStickyBar');
            if (window.pageYOffset > 250) bar.classList.add('show'); else bar.classList.remove('show');
        });
    </script>
</body>
</html>
