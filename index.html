<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사거리인터넷</title>
    <link rel="icon" href="사거리 로고.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght=500;700;900&family=Noto+Sans+KR:wght=500;700;900&display=swap">
    <style>
        :root { 
            --main-bg: #3E441E; 
            --point-color: #2D3214; 
            --gold-color: #FFD700;
            --fire-orange: #FF5722;
        }
        html {
            scroll-behavior: smooth; /* 메뉴 클릭 시 부드럽게 스크롤 이동 */
        }
        body { 
            margin: 0; padding: 0;
            font-family: 'Gmarket Sans', 'Noto Sans KR', sans-serif; 
            background-color: var(--main-bg); 
            color: #fff; 
            text-align: center;
        }

        /* 📋 상단 네비게이션 메뉴 스타일 */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: var(--point-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            padding: 8px 16px;
            transition: all 0.2s ease;
        }

        /* 🎯 [사장님전용] 특별 테두리 강조 스타일 */
        .nav-menu a.highlight-boss {
            color: var(--gold-color);
            border: 2px solid var(--gold-color); /* 금색 테두리 추가 */
            border-radius: 6px;
            background-color: rgba(255, 215, 0, 0.1); /* 미세한 불빛 효과 */
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            font-weight: 900;
        }
        .nav-menu a.highlight-boss:hover {
            background-color: var(--gold-color);
            color: #111;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }
        .nav-menu a:not(.highlight-boss):hover {
            color: var(--gold-color);
        }

        /* 섹션 공통 디자인 */
        .section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .section-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-color);
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <!-- 📋 상단 메뉴 구역 (각 섹션 ID로 부드럽게 연결) -->
    <div class="nav-menu">
        <a href="boss.html" target="_blank" class="highlight-boss">🏬 사장님전용</a>
        <a href="#calculator-section">📊 요금계산기</a>
        <a href="#gift-section">🎁 사은품관</a>
        <a href="#review-section">💬 실시간후기</a>
    </div>

    <!-- 1. 사장님전용 바로가기 (현재는 팝업창으로 연동) -->
    <!-- 기존 메인 홈 배너나 사장님 전용 섹션이 있다면 여기에 위치합니다 -->

    <!-- 2. 요금계산기 섹션 (기존에 구현해 두신 계산기 코드를 이 안에 유지하시면 됩니다) -->
    <div id="calculator-section" class="section">
        <div class="section-title">📊 맞춤 요금 계산기</div>
        <!-- [대표님의 기존 요금계산기 코드 자리] -->
        <p style="color: #aaa;">(현재 픽스된 계산기 내용이 노출되는 구역입니다)</p>
    </div>

    <!-- 3. 사은품 섹션 (이제 본격적으로 꾸밀 구역) -->
    <div id="gift-section" class="section">
        <div class="section-title">🎁 사거리인터넷 역대급 사은품 혜택</div>
        <p>여기서부터 사은품을 멋지게 꾸며볼 예정입니다.</p>
    </div>

    <!-- 4. 실시간후기 섹션 (마지막 단계) -->
    <div id="review-section" class="section">
        <div class="section-title">💬 고객 실시간 가입 후기</div>
        <p>생생한 실시간 후기판이 들어올 자리입니다.</p>
    </div>

</body>
</html>
