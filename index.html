<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <title>사거리인터넷 실시간 요금 안내</title>
    <style>
        /* 🎨 대표님의 국방색 테마 설정 */
        :root { 
            --main-bg: #4B5320; 
            --point-color: #3B4218; 
            --kt-color: #d32f2f; 
            --lg-color: #c2185b; 
            --sk-color: #e65100; 
            --sky-color: #0288d1; 
            --hello-color: #7b1fa2; 
        }
        body { 
            margin: 0; 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: var(--main-bg); 
            color: #fff; 
        }
        
        /* 마스코트 캐릭터와 타이틀 구역 */
        .header-container { 
            padding: 40px 20px; 
            text-align: center; 
            background: linear-gradient(
                to bottom, 
                rgba(0,0,0,0.4), 
                rgba(0,0,0,0.1)
            ); 
        }
        
        /* 🐻 마스코트 이미지 스타일 */
        .mascot-img { 
            max-width: 150px; 
            height: auto; 
            border-radius: 50%; 
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #fff; 
            padding: 5px;
        }
        
        .main-title { 
            font-size: 28px; 
            font-weight: bold; 
            margin: 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6); 
        }
        .notice { 
            font-size: 14px; 
            color: #ffeb3b; 
            font-weight: bold; 
            margin-top: 12px; 
        }
        
        /* 통신사 필터링 버튼 탭 */
        .nav-tabs { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.2); 
            padding: 10px 0; 
        }
        .tab-btn { 
            border: 2px solid #fff; 
            background: none; 
            padding: 8px 16px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #fff; 
            margin: 5px; 
            border-radius: 20px; 
        }
        .tab-btn.active, .tab-btn:hover { 
            background: #fff; 
            color: var(--main-bg); 
        }
        
        /* 요금 카드 레이아웃 */
        .grid-container { 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(
                auto-fill, 
                minmax(280px, 1fr)
            ); 
            gap: 20px; 
        }
        .card { 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            border-top: 6px solid #ccc; 
            color: #333; 
        }
        
        .card.kt { border-top-color: var(--kt-color); } 
        .card.lg { border-top-color: var(--lg-color); } 
        .card.sk { border-top-color: var(--sk-color); } 
        .card.sky { border-top-color: var(--sky-color); } 
        .card.hello { border-top-color: var(--hello-color); }
        
        .card-header { 
            padding: 20px; 
            background: #fdfdfd; 
            border-bottom: 1px solid #f3f3f3; 
        }
        .provider-badge { 
            display: inline-block; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold; 
            color: #fff; 
            margin-bottom: 8px; 
        }
        .kt .provider-badge { background: var(--kt-color); } 
        .lg .provider-badge { background: var(--lg-color); } 
        .sk .provider-badge { background: var(--sk-color); } 
        .sky .provider-badge { background: var(--sky-color); } 
        .hello .provider-badge { background: var(--hello-color); }
        
        .speed-title { 
            font-size: 18px; 
            font-weight: bold; 
            margin: 0; 
            color: #111; 
        }
        .card-body { 
            padding: 20px; 
            flex-grow: 1; 
            text-align: center; 
        }
        .price-box { margin: 10px 0; }
        .price-label { 
            font-size: 12px; 
            color: #999; 
            text-decoration: line-through; 
        }
        .price-main { 
            font-size: 26px; 
            font-weight: bold; 
            color: #111; 
        }
        .price-main span { 
            font-size: 14px; 
            font-weight: normal; 
        }
        
        .benefit-box { 
            background: #fff3e0; 
            border-radius: 6px; 
            padding: 12px; 
            margin-top: 12px; 
            font-size: 13px; 
            font-weight: bold; 
            color: #d35400; 
            border: 1px dashed #ffb74d; 
        }
        
        .btn-consult { 
            display: block; 
            width: 100%; 
            padding: 12px 0; 
            background: var(--point-color); 
            color: #fff; 
            text-align: center; 
            text-decoration: none; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
        }
        .loading { 
            text-align: center; 
            padding: 50px; 
            font-size: 16px; 
            grid-column: 1/-1; 
        }
        .footer { 
            text-align: center; 
            color: rgba(255,255,255,0.6); 
            font-size: 13px; 
            padding: 30px 0; 
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="https://via.placeholder.com/150" 
             alt="마스코트" 
             class="mascot-img">
        <h1 class="main-title">🌐 사거리인터넷 실시간 요금 안내</h1>
        <div class="notice">★ 돈 절약! 최대 혜택! 실시간 단가표 ★</div>
    </div>
    
    <div class="nav-tabs">
        <button class="tab-btn active" 
                onclick="filterProvider('all')">전체보기</button>
        <button class="tab-btn" 
                onclick="filterProvider('KT')">KT 올레</button>
        <button class="tab-btn" 
                onclick="filterProvider('LG')">LG U+</button>
        <button class="tab-btn" 
                onclick="filterProvider('SK')">SK브로드밴드</button>
        <button class="tab-btn" 
                onclick="filterProvider('스카이')">스카이라이프</button>
        <button class="tab-btn" 
                onclick="filterProvider('헬로')">LG헬로비전</button>
    </div>

    <div class="grid-container" id="rate-grid">
        <div class="loading">요금제 데이터를 불러오는 중입니다...</div>
    </div>

    <div class="footer">www.사거리인터넷.com</div>

    <script>
        // 대표님의 진짜 구글 시트 ID가 정확히 반영되었습니다!
        const sheetId = 
        '14xary6wzUQph0YEYAS1Ewc_eWtOo1KIkw5FKpZEl28c';
        
        const csvUrl = 
        `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                const rows = text.split('\n').map(row => row.split(','));
                allData = rows.slice(1).filter(r => r[0] && r[0].trim() !== "");
                renderCards(allData);
            } catch (error) {
                document.getElementById('rate-grid').innerHTML = 
                '<div class="loading">데이터 로드 실패. [웹에 게시]를 확인해주세요.</div>';
            }
        }

        function getCardClass(provider) {
            if(provider.includes('KT')) return 'kt';
            if(provider.includes('LG U')) return 'lg';
            if(provider.includes('SK')) return 'sk';
            if(provider.includes('스카이')) return 'sky';
            if(provider.includes('헬로')) return 'hello';
            return '';
        }

        function renderCards(data) {
            const grid = document.getElementById('rate-grid');
            grid.innerHTML = '';
            
            data.forEach(row => {
                const provider = row[0].replace(/"/g, '').trim();
                const speed = row[1].replace(/"/g, '').trim();
                const basePrice = parseInt(row[2]) ? 
                      parseInt(row[2]).toLocaleString() : row[2];
                const finalPrice = parseInt(row[4]) ? 
                      parseInt(row[4]).toLocaleString() : row[4];
                const totalGift = row[8] ? 
                      row[8].replace(/"/g, '').trim() : '최대지원';

                const cardClass = getCardClass(provider);

                const cardHtml = `
                    <div class="card ${cardClass}" data-provider="${provider}">
                        <div class="card-header">
                            <span class="provider-badge">${provider}</span>
                            <h3 class="speed-title">${speed}</h3>
                        </div>
                        <div class="card-body">
                            <div class="price-box">
                                <div class="price-label">본사기준 월 ${basePrice}원</div>
                                <div class="price-main">${finalPrice}<span>원/월</span></div>
                            </div>
                            <div class="benefit-box">🎁 총 혜택: ${totalGift}</div>
                        </div>
                        <button class="btn-consult" 
                                onclick="alert('전화 혹은 카톡으로 문의하시면 신속하게 상담해 드립니다!')">
                                빠른 상담 신청하기
                        </button>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        function filterProvider(providerKey) {
            document.querySelectorAll('.tab-btn')
                    .forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(providerKey === 'all') {
                renderCards(allData);
            } else {
                const filtered = allData.filter(row => row[0].includes(providerKey));
                renderCards(filtered);
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
